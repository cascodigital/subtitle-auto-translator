services:
  libretranslate:
    container_name: libretranslate
    image: libretranslate/libretranslate:latest
    restart: unless-stopped
    ports:
      - "15000:5000"
    environment:
      - LT_UPDATE_MODELS=true
      - LT_LOAD_ONLY=en,pt
      - LT_THREADS=4
    volumes:
      - libretranslate_data:/home/libretranslate/.local
    healthcheck:
      test: ["CMD-SHELL", "./venv/bin/python scripts/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - legendas_network

  legendas:
    container_name: legendas
    image: python:3.9-slim
    depends_on:
      libretranslate:
        condition: service_healthy
    volumes:
      - /dados/dockers/legendas:/app
      - /dados/movies:/movies
      - /dados/tv:/tv
    environment:
      - TZ=America/Sao_Paulo
      - TRANSLATE_API_URL=http://libretranslate:5000/translate
      - PROCESS_EXISTING_EN_ONLY=0
    working_dir: /app
    command: >
      bash -c "apt-get update &&
      apt-get install -y --no-install-recommends mkvtoolnix &&
      pip install requests pysrt tqdm &&
      python /app/translate_subtitles.py"
    networks:
      - legendas_network

volumes:
  libretranslate_data:

networks:
  legendas_network:
    driver: bridge
